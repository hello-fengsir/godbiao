name: Feishu Notify

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        uses: actions/github-script@v6
        env:
          FEISHU_WEBHOOK: https://open.feishu.cn/open-apis/bot/v2/hook/ce3e2c30-4176-4f51-9051-b96399858e81
        with:
          script: |
            const type = 'Code Push';
            const title = context.payload.head_commit.message.split('\n')[0];
            const author = context.payload.head_commit.author.name;
            const url = context.payload.head_commit.url;
            const repo = context.repo.owner + '/' + context.repo.repo;
            const body = JSON.stringify({
              msg_type: 'interactive',
              card: {
                header: {
                  title: { tag: 'plain_text', content: type },
                  template: 'blue'
                },
                elements: [
                  {
                    tag: 'div',
                    text: {
                      tag: 'lark_md',
                      content: '**Repo:** ' + repo + '\n**Title:** ' + title + '\n**Author:** ' + author + '\n**Link:** [View](' + url + ')'
                    }
                  }
                ]
              }
            });
            const resp = await fetch(process.env.FEISHU_WEBHOOK, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: body
            });
            console.log('Feishu response:', resp.status);
